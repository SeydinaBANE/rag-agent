global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: rag-agent
    static_configs:
      - targets: ["app:8000"]
    metrics_path: /metrics

  - job_name: celery
    static_configs:
      - targets: ["worker:9080"]  # celery prometheus exporter

  - job_name: chromadb
    static_configs:
      - targets: ["chromadb:8000"]
