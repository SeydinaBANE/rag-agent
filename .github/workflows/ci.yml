name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_call:
    secrets:
      OPENROUTER_API_KEY:
        required: true
      CODECOV_TOKEN:
        required: false

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv pip install -e ".[dev]"
      - run: uv run ruff check src tests
      - run: uv run mypy src/rag_agent

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ragdb_test
          POSTGRES_USER: raguser
          POSTGRES_PASSWORD: ragpass
        ports: ["5432:5432"]
        options: --health-cmd "pg_isready -U raguser" --health-interval 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-retries 10
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      DATABASE_URL: postgresql+asyncpg://raguser:ragpass@localhost:5432/ragdb_test
      REDIS_URL: redis://localhost:6379/0
      APP_ENV: development
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - run: uv pip install -e ".[dev,eval]"
      - run: uv run pytest --cov-report=xml
      - uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [test, build]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - name: pip-audit
        run: |
          uv pip install pip-audit
          uv run pip-audit --requirement <(uv pip compile pyproject.toml)
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          exit-code: 1
